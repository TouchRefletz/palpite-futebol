name: Sync Cron

on:
  schedule:
    # GitHub Actions permite no mínimo a cada 5 minutos (sem limite do plano Hobby da Vercel).
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar sincronização no servidor
        env:
          DEPLOYMENT_URL: ${{ vars.DEPLOYMENT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Configure a variável DEPLOYMENT_URL em Settings > Secrets and variables > Actions > Variables"
            echo "Exemplo: https://seu-app.vercel.app"
            exit 1
          fi

          url="${DEPLOYMENT_URL%/}/api/sync-cron"
          headers=(-sS -o /tmp/sync-response.txt -w "%{http_code}")

          if [ -n "$CRON_SECRET" ]; then
            headers+=(-H "Authorization: Bearer $CRON_SECRET")
          fi

          status=$(curl "${headers[@]}" "$url")
          body=$(cat /tmp/sync-response.txt)

          echo "Status: $status"
          echo "Resposta: $body"

          if [ "$status" != "200" ]; then
            exit 1
          fi
